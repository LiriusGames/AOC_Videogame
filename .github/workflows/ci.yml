name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # sparse + blobless checkout: the game is ~2.5 MB, the source artwork
      # in Assets/ is ~410 MB and not needed for any check
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          sparse-checkout: game
          sparse-checkout-cone-mode: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax-check all JavaScript
        run: |
          find game -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | while IFS= read -r -d '' f; do
            node --check "$f"
          done

      - name: Asset integrity (atlas rects, sprite coverage, file refs)
        run: node game/test/assets.js

      - name: Rule regression tests
        run: node game/test/rules.js

      - name: Simulation matrix (360 AI games, invariants checked)
        run: node game/test/sim.js

      - name: Cloudflare private-room integration
        run: |
          npm ci
          npm run test:worker

      - name: Browser smoke test (save/resume in headless Chrome)
        run: |
          node game/test/browser.js
          node game/test/tutorial-browser.js

      - name: Accessibility gate (axe + keyboard-only scenario)
        run: node game/test/a11y.js

      - name: serve.js smoke test
        run: |
          node game/tools/serve.js 8477 &
          sleep 1
          curl -fsS -o /dev/null http://localhost:8477/
          curl -fsS -o /dev/null http://localhost:8477/js/engine.js
          type=$(curl -fsS -o /dev/null -w '%{content_type}' http://localhost:8477/assets/title.webp)
          [ "$type" = "image/webp" ]
          code=$(curl -s -o /dev/null -w '%{http_code}' --path-as-is http://localhost:8477/../README.md)
          [ "$code" = "403" ]
