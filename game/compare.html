<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Action spaces — before / after</title>
<style>
  body { background: #191c28; color: #fffcf0; font-family: Consolas, monospace; padding: 26px; }
  h1 { font-size: 17px; margin: 0 0 4px; color: #f5c86e; letter-spacing: 1px; }
  h2 { font-size: 14px; margin: 26px 0 8px; color: #ffd75e; letter-spacing: 1px; }
  p.note { font-size: 12px; color: #9aa3ad; margin: 0 0 8px; }
  .row { display: flex; gap: 26px; flex-wrap: wrap; margin-bottom: 10px; }
  figure { margin: 0; }
  figcaption { margin-bottom: 6px; font-size: 12px; color: #9aa3ad; }
  /* exact .loc tile geometry from the game at the 1600x900 design base:
     (1600-356 sidebar - 28 padding - 24 gaps)/3 x (620 hub - 28 - 12)/2, minus the 4px border */
  .tile {
    width: 389px; height: 282px; position: relative; overflow: hidden;
    border: 4px solid #221d16; box-shadow: 0 5px 0 rgba(0,0,0,.5); background: #151824;
  }
  .tile canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    image-rendering: pixelated; object-fit: cover;
  }
</style>
</head>
<body>
<h1>ACTION SPACES: BEFORE / AFTER</h1>
<p class="note">Each pair is shown at the actual gameplay tile size (1600&times;900 design base, object-fit: cover, nearest-neighbour). All scenes are live and animated. BEFORE = 168&times;112 logical px, AFTER = 336&times;224.</p>
<div id="rows"></div>
<script src="js/loc-art.js"></script>
<script>
  const SCENES = [
    ["ideas", "IDEAS — Café Bizarre"],
    ["hire", "HIRE — Talent Agency"],
    ["develop", "DEVELOP — Writers' Room"],
    ["print", "PRINT — Print Floor"],
    ["royalties", "ROYALTIES — Accounting"],
    ["sales", "SALES — Newsstand"],
  ];
  const rows = document.getElementById("rows");
  for (const [key, title] of SCENES) {
    const h = document.createElement("h2");
    h.textContent = title;
    rows.appendChild(h);
    const row = document.createElement("div");
    row.className = "row";
    for (const [label, attach] of [["BEFORE", "attachClassic"], ["AFTER", "attach"]]) {
      const fig = document.createElement("figure");
      const cap = document.createElement("figcaption");
      cap.textContent = label;
      const tile = document.createElement("div");
      tile.className = "tile";
      const cv = document.createElement("canvas");
      tile.appendChild(cv);
      fig.appendChild(cap); fig.appendChild(tile);
      row.appendChild(fig);
      LocArt[attach](cv, key);
    }
    rows.appendChild(row);
  }
</script>
</body>
</html>
